name: Development Workflow

on:
  push:
    branches: [ develop, feature/* ]
  pull_request:
    branches: [ develop ]

env:
  NODE_VERSION: '20'

jobs:
  # Quick validation for development branches
  dev-validation:
    name: Development Validation
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        
    - name: Validate Website
      working-directory: ./website
      run: |
        npm ci
        npm run lint -- --max-warnings 5  # Allow some warnings in dev
        npm run build
        
    - name: Validate Admin Dashboard
      working-directory: ./admin-dashboard
      run: |
        npm ci
        npm run lint -- --max-warnings 10  # Allow more warnings in dev
        npm run build
        
    - name: Check for breaking changes
      run: |
        echo "Checking for potential breaking changes..."
        # Add any specific checks for breaking changes here

  # Preview deployment for PRs
  preview-deploy:
    name: Preview Deployment
    runs-on: ubuntu-latest
    needs: dev-validation
    if: github.event_name == 'pull_request'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Deploy Website Preview
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID }}
        working-directory: ./website
        alias-domains: pr-${{ github.event.pull_request.number }}-wkp.vercel.app
        
    - name: Deploy Admin Preview
      uses: amondnet/vercel-action@v25
      with:
        vercel-token: ${{ secrets.VERCEL_TOKEN }}
        vercel-org-id: ${{ secrets.VERCEL_ADMIN_ORG_ID }}
        vercel-project-id: ${{ secrets.VERCEL_ADMIN_PROJECT_ID }}
        working-directory: ./admin-dashboard
        alias-domains: pr-${{ github.event.pull_request.number }}-admin-wkp.vercel.app
        
    - name: Comment PR with preview links
      uses: actions/github-script@v7
      with:
        script: |
          github.rest.issues.createComment({
            issue_number: context.issue.number,
            owner: context.repo.owner,
            repo: context.repo.repo,
            body: `## 🚀 Preview Deployments
            
            🌐 **Website Preview**: https://pr-${{ context.issue.number }}-wkp.vercel.app
            ⚙️ **Admin Preview**: https://pr-${{ context.issue.number }}-admin-wkp.vercel.app
            
            Please test the changes and leave feedback! 🍕`
          })
